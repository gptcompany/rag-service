services:
  rag:
    build:
      context: .
      args:
        VERSION: ${RAG_VERSION:-unknown}
        COMMIT_SHA: ${RAG_COMMIT_SHA:-unknown}
        BUILD_AT: ${RAG_BUILD_AT:-unknown}
    ports:
      - "${RAG_PORT:-8767}:${RAG_PORT:-8767}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/app/.env:ro
      - ./.env.keys:/app/.env.keys:ro
      - huggingface_cache:/root/.cache/huggingface
      - ./data:/app/data
    environment:
      - RAG_PARSER=docling
      - RAG_DEFAULT_PARSER=docling
      - PARSER=docling
      - RAG_WORKING_DIR=/app/data/rag_knowledge_base
      - OLLAMA_HOST=${RAG_OLLAMA_HOST:-http://host.docker.internal:11434}

volumes:
  huggingface_cache:
