name: Notify PePeRS Integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/notify-pepers-integration.yml"
      - "scripts/**"
      - "tests/**"
      - "raganything/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    if: github.repository_owner == 'gptcompany'
    runs-on: [self-hosted, Linux, X64, sam-workstation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dispatch tokens via dotenvx (self-hosted fallback)
        id: tokens
        run: |
          PEPERS_TOKEN="${{ secrets.PEPERS_REPO_DISPATCH_TOKEN || secrets.PAT }}"
          PD_TOKEN="${{ secrets.PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN || secrets.PAT }}"
          
          if command -v dotenvx &> /dev/null && [[ -f .env ]]; then
            # If GitHub secrets are missing, try local dotenvx fallback on sam-workstation
            if [[ -z "$PEPERS_TOKEN" ]]; then
              echo "Resolving PEPERS_REPO_DISPATCH_TOKEN via dotenvx..."
              PEPERS_TOKEN=$(dotenvx get PEPERS_REPO_DISPATCH_TOKEN || dotenvx get GITHUB_PAT || dotenvx get PAT || true)
            fi
            if [[ -z "$PD_TOKEN" ]]; then
              echo "Resolving PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN via dotenvx..."
              PD_TOKEN=$(dotenvx get PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN || dotenvx get GITHUB_PAT || dotenvx get PAT || true)
            fi
          fi

          if [[ -n "$PEPERS_TOKEN" ]]; then
            echo "pepers_token=$PEPERS_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PEPERS_TOKEN"
          fi
          if [[ -n "$PD_TOKEN" ]]; then
            echo "pd_token=$PD_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PD_TOKEN"
          fi

      - name: Repository dispatch to pepers
        id: pepers_dispatch
        env:
          DISPATCH_TOKEN: ${{ steps.tokens.outputs.pepers_token }}
        if: env.DISPATCH_TOKEN != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.tokens.outputs.pepers_token }}
          repository: gptcompany/pepers
          event-type: rag-service-update
          client-payload: >-
            {"source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","source_workflow":"${{ github.workflow }}"}

      - name: Pepers dispatch warning
        if: steps.pepers_dispatch.outcome == 'failure'
        run: |
          echo "::warning::pepers repository_dispatch failed. Check PEPERS_REPO_DISPATCH_TOKEN or PAT validity/scope."
          echo "pepers repository_dispatch failed. Check PEPERS_REPO_DISPATCH_TOKEN or PAT validity/scope." >> "$GITHUB_STEP_SUMMARY"

      - name: Repository dispatch to progressive-deploy
        id: progressive_dispatch
        env:
          DISPATCH_TOKEN: ${{ steps.tokens.outputs.pd_token }}
        if: env.DISPATCH_TOKEN != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.tokens.outputs.pd_token }}
          repository: gptcompany/progressive-deploy
          event-type: rag-service-build
          client-payload: >-
            {"source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","source_workflow":"${{ github.workflow }}","ref":"${{ github.sha }}"}

      - name: Missing token notice for pepers
        if: steps.tokens.outputs.pepers_token == ''
        run: |
          echo "No dispatch token configured (expected PEPERS_REPO_DISPATCH_TOKEN or PAT); skipping pepers repository_dispatch." >> "$GITHUB_STEP_SUMMARY"

      - name: Missing token notice for progressive-deploy
        if: steps.tokens.outputs.pd_token == ''
        run: |
          echo "No dispatch token configured (expected PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN or PAT); skipping progressive-deploy repository_dispatch." >> "$GITHUB_STEP_SUMMARY"
