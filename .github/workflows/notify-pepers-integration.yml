name: Notify PePeRS Integration

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/notify-pepers-integration.yml"
      - "scripts/**"
      - "tests/**"
      - "raganything/**"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      force_progressive_dispatch:
        description: Force progressive-deploy dispatch even if rag-service has active jobs
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  notify:
    if: github.repository_owner == 'gptcompany'
    runs-on: [self-hosted, Linux, X64, sam-workstation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dispatch tokens via dotenvx (self-hosted fallback)
        id: tokens
        run: |
          PEPERS_TOKEN="${{ secrets.PEPERS_REPO_DISPATCH_TOKEN || secrets.PAT }}"
          PD_TOKEN="${{ secrets.PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN || secrets.PAT }}"
          
          if command -v dotenvx &> /dev/null && [[ -f .env ]]; then
            # If GitHub secrets are missing, try local dotenvx fallback on sam-workstation
            if [[ -z "$PEPERS_TOKEN" ]]; then
              echo "Resolving PEPERS_REPO_DISPATCH_TOKEN via dotenvx..."
              PEPERS_TOKEN=$(dotenvx get PEPERS_REPO_DISPATCH_TOKEN || dotenvx get GITHUB_PAT || dotenvx get PAT || true)
            fi
            if [[ -z "$PD_TOKEN" ]]; then
              echo "Resolving PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN via dotenvx..."
              PD_TOKEN=$(dotenvx get PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN || dotenvx get GITHUB_PAT || dotenvx get PAT || true)
            fi
          fi

          if [[ -n "$PEPERS_TOKEN" ]]; then
            echo "pepers_token=$PEPERS_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PEPERS_TOKEN"
          fi
          if [[ -n "$PD_TOKEN" ]]; then
            echo "pd_token=$PD_TOKEN" >> "$GITHUB_OUTPUT"
            echo "::add-mask::$PD_TOKEN"
          fi

      - name: Repository dispatch to pepers
        id: pepers_dispatch
        env:
          DISPATCH_TOKEN: ${{ steps.tokens.outputs.pepers_token }}
        if: env.DISPATCH_TOKEN != ''
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.tokens.outputs.pepers_token }}
          repository: gptcompany/pepers
          event-type: rag-service-update
          client-payload: >-
            {"source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","source_workflow":"${{ github.workflow }}"}

      - name: Pepers dispatch warning
        if: steps.pepers_dispatch.outcome == 'failure'
        run: |
          echo "::warning::pepers repository_dispatch failed. Check PEPERS_REPO_DISPATCH_TOKEN or PAT validity/scope."
          echo "pepers repository_dispatch failed. Check PEPERS_REPO_DISPATCH_TOKEN or PAT validity/scope." >> "$GITHUB_STEP_SUMMARY"

      - name: Check rag-service activity
        id: activity
        env:
          RAG_HEALTH_URL: ${{ vars.RAG_SERVICE_HEALTH_URL }}
        run: |
          HEALTH_URL="${RAG_HEALTH_URL:-http://127.0.0.1:8767/health}"
          echo "health_url=${HEALTH_URL}" >> "$GITHUB_OUTPUT"
          if ! payload=$(curl -fsS "$HEALTH_URL"); then
            echo "dispatch_allowed=false" >> "$GITHUB_OUTPUT"
            echo "active_jobs=unknown" >> "$GITHUB_OUTPUT"
            echo "::warning::rag-service health check failed at ${HEALTH_URL}; skipping progressive-deploy dispatch by default."
            echo "rag-service health check failed at ${HEALTH_URL}; skipping progressive-deploy dispatch by default." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          active_jobs=$(printf '%s' "$payload" | jq -r '.jobs.active_jobs // "unknown"')
          echo "active_jobs=${active_jobs}" >> "$GITHUB_OUTPUT"

          if [ "$active_jobs" = "0" ]; then
            echo "dispatch_allowed=true" >> "$GITHUB_OUTPUT"
            echo "rag-service active_jobs=0; progressive-deploy dispatch allowed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "dispatch_allowed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::rag-service active_jobs=${active_jobs}; skipping progressive-deploy dispatch to avoid interrupting in-flight work."
            echo "rag-service active_jobs=${active_jobs}; skipping progressive-deploy dispatch to avoid interrupting in-flight work." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Repository dispatch to progressive-deploy
        id: progressive_dispatch
        env:
          DISPATCH_TOKEN: ${{ steps.tokens.outputs.pd_token }}
        if: env.DISPATCH_TOKEN != '' && (steps.activity.outputs.dispatch_allowed == 'true' || inputs.force_progressive_dispatch == true)
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.tokens.outputs.pd_token }}
          repository: gptcompany/progressive-deploy
          event-type: rag-service-build
          client-payload: >-
            {"source_repo":"${{ github.repository }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","source_workflow":"${{ github.workflow }}","ref":"${{ github.sha }}"}

      - name: Progressive-deploy dispatch warning
        if: steps.progressive_dispatch.outcome == 'failure'
        run: |
          echo "::warning::progressive-deploy repository_dispatch failed. Check PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN or PAT validity/scope."
          echo "progressive-deploy repository_dispatch failed. Check PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN or PAT validity/scope." >> "$GITHUB_STEP_SUMMARY"

      - name: Missing token notice for pepers
        if: steps.tokens.outputs.pepers_token == ''
        run: |
          echo "No dispatch token configured (expected PEPERS_REPO_DISPATCH_TOKEN or PAT); skipping pepers repository_dispatch." >> "$GITHUB_STEP_SUMMARY"

      - name: Missing token notice for progressive-deploy
        if: steps.tokens.outputs.pd_token == ''
        run: |
          echo "No dispatch token configured (expected PROGRESSIVE_DEPLOY_REPO_DISPATCH_TOKEN or PAT); skipping progressive-deploy repository_dispatch." >> "$GITHUB_STEP_SUMMARY"

      - name: Progressive-deploy skip notice
        if: steps.tokens.outputs.pd_token != '' && steps.activity.outputs.dispatch_allowed != 'true' && inputs.force_progressive_dispatch != true
        run: |
          echo "progressive-deploy dispatch skipped because rag-service is busy or unreachable." >> "$GITHUB_STEP_SUMMARY"

      - name: Progressive-deploy force notice
        if: steps.tokens.outputs.pd_token != '' && steps.activity.outputs.dispatch_allowed != 'true' && inputs.force_progressive_dispatch == true
        run: |
          echo "::warning::force_progressive_dispatch=true bypassed the rag-service activity gate."
          echo "force_progressive_dispatch=true bypassed the rag-service activity gate." >> "$GITHUB_STEP_SUMMARY"
